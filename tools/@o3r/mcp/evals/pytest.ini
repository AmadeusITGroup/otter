[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
# Disable pytest-rerunfailures: the session-scoped agent_result_cache
# fixture persists across reruns, so retries would reuse the same cached
# (bad) result and never succeed.
# Disable pytest-xdist: the session-scoped MCP client uses a single stdio
# pipe, which is incompatible with parallel workers.
addopts = -p no:rerunfailures -p no:xdist
markers =
    llm: tests that require Azure OpenAI credentials (az login)
