name: DeepEval MCP Tests

on:
  workflow_call:
    inputs:
      skipTests:
        type: boolean
        required: false
        default: false
        description: Skip deepeval tests
    secrets:
      DEEPEVAL_LLM_API_KEY:
        required: true
        description: API key for the LLM judge (OpenAI or Anthropic)
      O3R_MCP_GITHUB_TOKEN:
        required: false
        description: GitHub token for testing GitHub-dependent MCP tools

env:
  YARN_ENABLE_HARDENED_MODE: 0

permissions:
  contents: read

jobs:
  deepeval:
    if: ${{ !inputs.skipTests }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-level: [tool-outputs, agent-selection]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: ./tools/github-actions/setup
        timeout-minutes: 30

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'tools/@o3r/mcp/evals/requirements.lock'

      - name: Install Python dependencies
        run: pip install -r tools/@o3r/mcp/evals/requirements.lock

      - name: Build MCP server
        run: yarn nx build mcp

      - name: Run deepeval - tool outputs
        if: matrix.test-level == 'tool-outputs'
        env:
          OPENAI_API_KEY: ${{ secrets.DEEPEVAL_LLM_API_KEY }}
          O3R_MCP_GITHUB_TOKEN: ${{ secrets.O3R_MCP_GITHUB_TOKEN }}
        working-directory: tools/@o3r/mcp/evals
        run: deepeval test run test_tool_outputs.py --verbose

      - name: Run deepeval - agent selection
        if: matrix.test-level == 'agent-selection'
        env:
          OPENAI_API_KEY: ${{ secrets.DEEPEVAL_LLM_API_KEY }}
          O3R_MCP_GITHUB_TOKEN: ${{ secrets.O3R_MCP_GITHUB_TOKEN }}
        working-directory: tools/@o3r/mcp/evals
        run: deepeval test run test_agent_selection.py --verbose

      - name: Upload deepeval results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: deepeval-results-${{ matrix.test-level }}
          path: tools/@o3r/mcp/evals/.deepeval/
          if-no-files-found: ignore
