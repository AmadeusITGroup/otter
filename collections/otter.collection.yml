# yaml-language-server: $schema=https://raw.githubusercontent.com/AmadeusITGroup/ai-primitives-hub/refs/heads/main/schemas/collection.schema.json
id: otter
name: Otter
description: Collection for Otter
items:
  - path: tools/llm/plugins/otter/skills/otter-rules-engine/SKILL.md
    kind: skill
    title: Otter Rules Engine
    description: Author and debug rules-engine facts, operators, actions, and rulesets in an Otter workspace
    tags:
      - rules-engine
      - facts
      - operators
      - rulesets
display:
  ordering: manual
  show_badge: true
mcp:
  items:
    otter:
      command: npx
      args:
        - -y
        - -p
        - '@o3r/mcp@^14.0.0'
        - o3r-mcp-start

    angular:
      command: npx
      args:
        - -y
        - '@angular/cli@^21.0.0'
        - mcp

    playwright:
      command: npx
      args:
        - -y
        - '@playwright/mcp@~0.0.70'
